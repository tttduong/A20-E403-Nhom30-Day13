# SLO definitions — Nhóm điền số "hiện tại" vào blueprint sau khi D chạy load test.
# Map nhanh tới GET /metrics (app/metrics.py):
#   latency_p95_ms     ≈ latency_p95 (đơn vị ms)
#   error_rate_pct     = 100 * (tổng lỗi / traffic) — tự tính từ error_breakdown + traffic
#   daily_cost_usd     ≈ total_cost_usd (chu kỳ 1d khi demo; lab in-memory là tích lũy phiên)
#   quality_score_avg  ≈ quality_avg
service: day13-observability-lab
window: 28d
slis:
  latency_p95_ms:
    objective: 3000
    target: 99.5
    note: "P95 latency; alert triệu chứng tại 5000ms/30m (xem alert_rules)"
  error_rate_pct:
    objective: 2
    target: 99.0
    note: "Tỷ lệ lỗi HTTP/log; SLO 2% — alert tại 5%/5m"
  daily_cost_usd:
    objective: 2.5
    target: 100.0
    note: "Ngân sách cost/ngày; alert cost spike theo baseline giờ"
  quality_score_avg:
    objective: 0.75
    target: 95.0
    note: "Điểm quality heuristic trung bình; alert khi trung bình < 0.75"
