# Ba rule bắt buộc + một rule bonus (chất lượng).
# runbook: anchor tương ứng mục trong docs/alerts.md
alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 5000 for 30m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 2x_baseline for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
  - name: quality_score_below_slo
    severity: P3
    condition: quality_score_avg < 0.75 for 1h
    type: slo-based
    owner: team-oncall
    runbook: docs/alerts.md#4-low-average-quality-score
